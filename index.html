<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Algorithm · Official Testing Cheat Sheet</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>CTF Algorithm <span class="version">v2.0</span></h1>
                <p class="subtitle">Cognitive Trajectory Fusion · Official Testing Reference</p>
                <div class="header-badges">
                    <span class="badge"><i class="fas fa-bolt"></i> 5 Signals</span>
                    <span class="badge"><i class="fas fa-weight-hanging"></i> 5 Weights</span>
                    <span class="badge"><i class="fas fa-cubes"></i> 2 Modes</span>
                    <span class="badge"><i class="fas fa-flask"></i> 6 Test Cases</span>
                </div>
            </div>
            <div class="header-glow"></div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="overview">
                <i class="fas fa-chart-pie"></i> Overview
            </button>
            <button class="nav-tab" data-tab="signals">
                <i class="fas fa-satellite"></i> Signals
            </button>
            <button class="nav-tab" data-tab="bwv">
                <i class="fas fa-weight-scale"></i> BWV
            </button>
            <button class="nav-tab" data-tab="irt">
                <i class="fas fa-chart-line"></i> IRT
            </button>
            <button class="nav-tab" data-tab="glicko">
                <i class="fas fa-star"></i> Glicko
            </button>
            <button class="nav-tab" data-tab="modes">
                <i class="fas fa-code-branch"></i> Modes
            </button>
            <button class="nav-tab" data-tab="testcases">
                <i class="fas fa-flask"></i> Test Cases
            </button>
            <button class="nav-tab" data-tab="cheatsheet">
                <i class="fas fa-scroll"></i> Cheat Sheet
            </button>
        </nav>

        <!-- Main Content -->
        <main class="content" id="content">
            <!-- JavaScript will populate this -->
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Loading CTF Algorithm...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>CTF Algorithm · Official Testing Version</p>
            <p class="footer-meta">
                <span id="lastUpdated"></span>
                <span class="separator">•</span>
                <span>JEE/NEET Platform</span>
                <span class="separator">•</span>
                <span>Production Ready</span>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
